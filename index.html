<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Game</title>
  <style>
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: monospace;
      color: white;
    }
    h1 { margin-bottom: 10px; font-size: 1.4rem; color: #e94560; }
    canvas {
      border: 2px solid #e94560;
      border-radius: 4px;
      background: #16213e;
    }
    #info {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #a8a8b3;
    }
    #log {
      margin-top: 8px;
      width: 500px;
      height: 60px;
      overflow-y: auto;
      background: #0f3460;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 0.75rem;
      color: #00d4aa;
    }
  </style>
</head>
<body>
  <h1>🤖 AI Game</h1>
  <canvas id="gameCanvas" width="500" height="400"></canvas>
  <div id="info">Score: <span id="score">0</span> &nbsp;|&nbsp; Level: <span id="level">1</span></div>
  <div id="log">AI log will appear here...</div>

  <script>
    // ─────────────────────────────────────────────
    //  SETUP
    // ─────────────────────────────────────────────
    const canvas = document.getElementById("gameCanvas");
    const ctx    = canvas.getContext("2d");
    const logEl  = document.getElementById("log");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");

    let score = 0;
    let level = 1;

    // ─────────────────────────────────────────────
    //  PLAYER  — this is the object the AI controls
    // ─────────────────────────────────────────────
    const player = {
      x: 50,
      y: 200,
      width: 28,
      height: 28,
      speed: 3,
      color: "#e94560",

      // Draw the player on the canvas
      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.roundRect(this.x, this.y, this.width, this.height, 5);
        ctx.fill();

        // little "eye" so you can tell which way it faces
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(this.x + this.width - 7, this.y + 10, 4, 0, Math.PI * 2);
        ctx.fill();
      },

      // Keep player inside the canvas
      clamp() {
        this.x = Math.max(0, Math.min(canvas.width  - this.width,  this.x));
        this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));
      }
    };

    // ─────────────────────────────────────────────
    //  COIN  — the AI's goal: collect it!
    // ─────────────────────────────────────────────
    const coin = {
      x: 400, y: 180, radius: 10, color: "#ffd700",
      respawn() {
        this.x = 30 + Math.random() * (canvas.width  - 60);
        this.y = 30 + Math.random() * (canvas.height - 60);
      },
      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#fff8";
        ctx.beginPath();
        ctx.arc(this.x - 3, this.y - 3, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    };

    // ─────────────────────────────────────────────
    //  OBSTACLES — the AI must avoid these
    // ─────────────────────────────────────────────
    const obstacles = [];

    function spawnObstacle() {
      obstacles.push({
        x: canvas.width,
        y: 20 + Math.random() * (canvas.height - 60),
        width: 20,
        height: 20 + Math.random() * 40,
        speed: 1.5 + level * 0.4,
        color: "#533483"
      });
    }

    // ─────────────────────────────────────────────
    //  AI BRAIN  — this function decides how the
    //  player moves every frame. Edit this to change
    //  how the AI behaves!
    // ─────────────────────────────────────────────
    function aiThink() {
      // Find the nearest obstacle that's close enough to dodge
      let danger = null;
      let minDist = Infinity;
      for (const obs of obstacles) {
        const dist = obs.x - (player.x + player.width);
        if (dist > 0 && dist < 150) {
          // Check vertical overlap
          const playerMid = player.y + player.height / 2;
          const obsMid    = obs.y + obs.height / 2;
          if (Math.abs(playerMid - obsMid) < 80) {
            if (dist < minDist) { minDist = dist; danger = obs; }
          }
        }
      }

      // ── Move toward the coin ──
      const targetX = coin.x - player.width  / 2;
      const targetY = coin.y - player.height / 2;
      const dx = targetX - player.x;
      const dy = targetY - player.y;

      let moveX = Math.sign(dx) * player.speed;
      let moveY = Math.sign(dy) * player.speed;

      // ── Dodge if an obstacle is close ──
      if (danger) {
        const obsMid    = danger.y + danger.height / 2;
        const playerMid = player.y + player.height / 2;
        // Move away from the obstacle's center vertically
        moveY = playerMid < obsMid ? -player.speed * 1.5 : player.speed * 1.5;
        aiLog(`Dodging obstacle at x=${Math.round(danger.x)}`);
      } else if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        aiLog(`Chasing coin at (${Math.round(coin.x)}, ${Math.round(coin.y)})`);
      }

      player.x += moveX;
      player.y += moveY;
      player.clamp();
    }

    // ─────────────────────────────────────────────
    //  HELPERS
    // ─────────────────────────────────────────────
    let lastLog = "";
    function aiLog(msg) {
      if (msg === lastLog) return;
      lastLog = msg;
      logEl.textContent = "🤖 " + msg;
    }

    function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx &&
             ay < by + bh && ay + ah > by;
    }

    // ─────────────────────────────────────────────
    //  GAME LOOP
    // ─────────────────────────────────────────────
    let frameCount = 0;
    let gameOver   = false;

    function update() {
      frameCount++;

      // Spawn obstacles periodically
      if (frameCount % Math.max(60, 120 - level * 10) === 0) spawnObstacle();

      // Move obstacles
      for (const obs of obstacles) obs.x -= obs.speed;

      // Remove off-screen obstacles
      obstacles.splice(0, obstacles.filter(o => o.x + o.width < 0).length);

      // AI decides where to move
      aiThink();

      // Coin collection check
      const coinDx = player.x + player.width  / 2 - coin.x;
      const coinDy = player.y + player.height / 2 - coin.y;
      if (Math.sqrt(coinDx * coinDx + coinDy * coinDy) < coin.radius + 14) {
        score++;
        scoreEl.textContent = score;
        if (score % 5 === 0) { level++; levelEl.textContent = level; }
        coin.respawn();
        aiLog(`Collected coin! Score: ${score}`);
      }

      // Collision with obstacles
      for (const obs of obstacles) {
        if (rectsOverlap(player.x, player.y, player.width, player.height,
                         obs.x, obs.y, obs.width, obs.height)) {
          gameOver = true;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid background (decorative)
      ctx.strokeStyle = "#ffffff08";
      for (let x = 0; x < canvas.width;  x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
      for (let y = 0; y < canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

      // Draw obstacles
      for (const obs of obstacles) {
        ctx.fillStyle = obs.color;
        ctx.beginPath();
        ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 4);
        ctx.fill();
      }

      coin.draw();
      player.draw();

      if (gameOver) {
        ctx.fillStyle = "#000000aa";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#e94560";
        ctx.font = "bold 36px monospace";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
        ctx.fillStyle = "white";
        ctx.font = "18px monospace";
        ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
        ctx.fillText("Refresh to restart", canvas.width / 2, canvas.height / 2 + 50);
      }
    }

    function loop() {
      if (!gameOver) update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
